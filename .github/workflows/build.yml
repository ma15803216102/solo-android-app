name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Version
        run: |
          # Calculate version code based on GitHub Run Number
          # We start from base version 1.0.0
          RUN_NUMBER=${{ github.run_number }}
          VERSION_NAME="1.0.${RUN_NUMBER}"
          
          echo "Updating to Version Code: $RUN_NUMBER, Version Name: $VERSION_NAME"
          
          # Replace version code and name in app/build.gradle
          sed -i "s/versionCode 1/versionCode $RUN_NUMBER/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Build Global APK
        working-directory: ./android
        run: |
          # Make sure app name explicitly says "Global" before build
          sed -i 's/>TRAE SOLO</>TRAE SOLO 国际版</g' app/src/main/res/values/strings.xml
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../TRAE-SOLO-Global-v1.0.${{ github.run_number }}.apk

      - name: Prepare CN App (solo.trae.cn)
        run: |
          # Modify capacitor.config.json
          sed -i 's/solo.trae.ai/solo.trae.cn/g' capacitor.config.json
          sed -i 's/"appId": "com.trae.solo"/"appId": "cn.trae.solo"/g' capacitor.config.json
          sed -i 's/"appName": "TRAE SOLO"/"appName": "TRAE SOLO CN版"/g' capacitor.config.json
          
          # Modify strings.xml
          sed -i 's/>TRAE SOLO 国际版</>TRAE SOLO CN版</g' android/app/src/main/res/values/strings.xml
          sed -i 's/>com.trae.solo</>cn.trae.solo</g' android/app/src/main/res/values/strings.xml
          
          # Modify build.gradle applicationId
          sed -i 's/applicationId "com.trae.solo"/applicationId "cn.trae.solo"/g' android/app/build.gradle
          
          # Sync capacitor to apply changes
          npx cap sync android

      - name: Build CN APK
        working-directory: ./android
        run: |
          ./gradlew clean assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../TRAE-SOLO-CN-v1.0.${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## TRAE SOLO Android Apps Update
            
            - **Version:** 1.0.${{ github.run_number }}
            - **Build:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            
            Automatically generated dual-builds by TRAE SOLO.
            - `TRAE-SOLO-Global-v1.0.x.apk`: Connects to `solo.trae.ai` (国际版)
            - `TRAE-SOLO-CN-v1.0.x.apk`: Connects to `solo.trae.cn` (CN版)
          files: |
            TRAE-SOLO-Global-v1.0.${{ github.run_number }}.apk
            TRAE-SOLO-CN-v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
